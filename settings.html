<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDMSMK - Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 800px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-align: center;
    }
    
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    
    .setting-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 2px solid transparent;
    }
    
    .setting-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    
    .setting-card h3 {
      color: #555;
      margin-bottom: 15px;
      font-size: 1.3rem;
    }
    
    .icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }
    
    button {
      width: 100%;
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      color: white;
    }
    
    .btn-password { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .btn-dark { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .btn-logout { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    /* Dark Mode CSS */
    body.dark { background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%); }
    body.dark .container { background: #2d2d2d; color: white; }
    body.dark .setting-card { background: #3a3a3a; }
    body.dark h1, body.dark h3 { color: white; }
    
    /* Big Screen Responsive */
    @media (min-width: 1200px) {
      .container { padding: 60px; }
      h1 { font-size: 3rem; }
      button { padding: 20px 30px; font-size: 1.3rem; }
    }
    
    /* Mobile Responsive */
    @media (max-width: 600px) {
      .container { padding: 20px; }
      h1 { font-size: 2rem; }
      .settings-grid { grid-template-columns: 1fr; }
    }
    
    .back-btn {
      background: #6c757d;
      margin-top: 30px;
      max-width: 200px;
      margin-left: auto;
      margin-right: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ Settings</h1>
    
    <div class="settings-grid">
      <div class="setting-card">
        <div class="icon">🔐</div>
        <h3>Change Password</h3>
        <button class="btn-password" onclick="changePassword()">Update Password</button>
      </div>
      
      <div class="setting-card">
        <div class="icon">🌙</div>
        <h3>Dark Mode</h3>
        <button class="btn-dark" onclick="toggleDarkMode()" id="darkBtn">Enable Dark Mode</button>
      </div>
      
      <div class="setting-card">
        <div class="icon">🚪</div>
        <h3>Logout</h3>
        <button class="btn-logout" onclick="confirmLogout()">Logout Account</button>
      </div>
    </div>
    
    <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
  </div>

  <script>
    // 1. Change Password Function
    function changePassword() {
      let oldPass = prompt("Enter Old Password:");
      if(oldPass) {
        let newPass = prompt("Enter New Password:");
        if(newPass && newPass.length >= 6) {
          alert("✅ Password changed successfully! \nFuture: Backend ki connect cheyali");
        } else {
          alert("❌ Password must be 6+ characters");
        }
      }
    }
    
    // 2. Dark Mode Toggle - Full Working
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      let isDark = document.body.classList.contains('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('darkBtn').innerText = isDark ? 'Disable Dark Mode' : 'Enable Dark Mode';
    }
    
    // Page load ayyaka dark mode check cheyi
    window.onload = () => {
      if(localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark');
        document.getElementById('darkBtn').innerText = 'Disable Dark Mode';
      }
    }
    
    // 3. Logout Confirmation
    function confirmLogout() {
      if(confirm("Are you sure you want to logout, Mangaveni?")) {
        localStorage.clear();
        alert("Logged out successfully!");
        window.location.href = "login.html"; // Nee login page name
      }
    }
    
    // 4. Back Button
    function goBack() {
      window.location.href = "dashboard.html"; // Dashboard page ki vellali
    }
  </script>
</body>
</html>
