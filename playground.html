<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mangaveni 💚 | Web Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Navbar */
    .navbar {
      background: #161b22;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #30363d;
    }
    .navbar h1 {
      font-size: 1.2rem;
      color: #58a6ff;
    }
    .logout-btn {
      background: #da3633;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    
    /* Tabs */
    .tabs {
      background: #161b22;
      display: flex;
      gap: 0;
      border-bottom: 1px solid #30363d;
      padding: 0 20px;
    }
    .tab {
      padding: 12px 20px;
      cursor: pointer;
      color: #8b949e;
      border-bottom: 2px solid transparent;
      font-weight: 600;
    }
    .tab.active {
      color: #58a6ff;
      border-bottom: 2px solid #58a6ff;
    }
    
    /* Editor + Preview */
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .editor-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #30363d;
    }
    .editor {
      flex: 1;
      background: #0d1117;
      color: #c9d1d9;
      border: none;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.6;
    }
    
    /* Preview */
    .preview-section {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .preview-header {
      background: #161b22;
      padding: 10px 20px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #8b949e;
      font-size: 0.9rem;
    }
    .run-btn {
      background: #238636;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .run-btn:hover {
      background: #2ea043;
    }
    #preview {
      flex: 1;
      border: none;
      background: white;
    }
    
    /* Hidden editors */
    .editor-content { display: none; }
    .editor-content.active { display: block; flex: 1; }
  </style>
</head>
<body>
  <div class="navbar">
    <h1>Mangaveni 💚 | Web Playground</h1>
    <button class="logout-btn" onclick="location.href='dashboard.html'">Logout</button>
  </div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('html')">HTML</div>
    <div class="tab" onclick="switchTab('css')">CSS</div>
    <div class="tab" onclick="switchTab('js')">JS</div>
  </div>
  
  <div class="container">
    <div class="editor-section">
      <textarea id="htmlEditor" class="editor editor-content active" spellcheck="false"><div class="card">
  <h1 id="title">Hi <span class="name">Mangaveni</span> 💚</h1>
  <p id="subtitle">Nuvvu button nokkite magic jarugutundi</p>
  <button onclick="doMagic()">✨ Magic Button</button>
  <div id="hearts"></div>
</div></textarea>
      
      <textarea id="cssEditor" class="editor editor-content" spellcheck="false">body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}
.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.name {
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}
button {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  padding: 15px 35px;
  border-radius: 50px;
  font-size: 1.1rem;
  cursor: pointer;
}
.heart {
  position: absolute;
  animation: floatUp 2s ease-out forwards;
}
@keyframes floatUp {
  100% { opacity: 0; transform: translateY(-200px); }
}</textarea>
      
      <textarea id="jsEditor" class="editor editor-content" spellcheck="false">function doMagic() {
  document.getElementById('title').innerHTML = 'Wow Mangaveni 💚';
  document.getElementById('subtitle').innerHTML = 'Magic chusava?';
  
  let hearts = document.getElementById('hearts');
  for(let i = 0; i < 10; i++) {
    let heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '💚';
    heart.style.left = Math.random() * 100 + '%';
    hearts.appendChild(heart);
    setTimeout(() => heart.remove(), 2000);
  }
}</textarea>
    </div>
    
    <div class="preview-section">
      <div class="preview-header">
        <span>📺 Live Output - Auto Saved 💚</span>
        <button class="run-btn" onclick="runCode()">▶ Run</button>
      </div>
      <iframe id="preview"></iframe>
    </div>
  </div>

  <script>
    let currentTab = 'html';
    
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.editor-content').forEach(e => e.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(tab + 'Editor').classList.add('active');
    }
    
    function runCode() {
      let html = document.getElementById('htmlEditor').value;
      let css = document.getElementById('cssEditor').value;
      let js = document.getElementById('jsEditor').value;
      
      let code = `
        <!DOCTYPE html>
        <html>
        <head><style>${css}</style></head>
        <body>${html}<script>${js}<\/script></body>
        </html>
      `;
      
      let preview = document.getElementById('preview');
      preview.srcdoc = code;
    }
    
    // Auto run on load
    runCode();
    
    // Auto save to localStorage
    setInterval(() => {
      localStorage.setItem('html', document.getElementById('htmlEditor').value);
      localStorage.setItem('css', document.getElementById('cssEditor').value);
      localStorage.setItem('js', document.getElementById('jsEditor').value);
    }, 2000);
    
    // Load saved code
    window.onload = () => {
      if(localStorage.getItem('html')) {
        document.getElementById('htmlEditor').value = localStorage.getItem('html');
        document.getElementById('cssEditor').value = localStorage.getItem('css');
        document.getElementById('jsEditor').value = localStorage.getItem('js');
        runCode();
      }
    }
  </script>
</body>
</html>
