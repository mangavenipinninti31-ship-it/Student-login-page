<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Playground Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; }
    .header { background: #161b22; padding: 12px 20px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.2rem; color: #58a6ff; }
    .btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-left: 5px; }
    .btn:hover { background: #2ea043; }
    .editor-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: #30363d; height: 50vh; }
    .editor-box { background: #0d1117; display: flex; flex-direction: column; }
    .editor-label { background: #161b22; padding: 8px; font-size: 0.9rem; color: #58a6ff; border-bottom: 1px solid #30363d; }
    textarea { flex: 1; background: #0d1117; color: #c9d1d9; border: none; padding: 12px; font-family: monospace; font-size: 14px; resize: none; outline: none; }
    .output-container { height: 50vh; background: white; }
    iframe { width: 100%; height: 100%; border: none; }
    @media (max-width: 768px) { .editor-container { grid-template-columns: 1fr; height: auto; } .editor-box { height: 200px; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>💻 Mangaveni 💚 | Web Playground Pro</h1>
    <div>
      <button class="btn" onclick="resetCode()">Reset</button>
      <button class="btn" onclick="runCode()">▶ Run Code</button>
      <button class="btn" onclick="location.href='dashboard.html'" style="background: #6e7681;">← Back</button>
    </div>
  </div>

  <div class="editor-container">
    <div class="editor-box">
      <div class="editor-label">HTML</div>
      <textarea id="html" placeholder="<!-- HTML code ikkada raayi -->"></textarea>
    </div>
    <div class="editor-box">
      <div class="editor-label">CSS</div>
      <textarea id="css" placeholder="/* CSS code ikkada raayi */"></textarea>
    </div>
    <div class="editor-box">
      <div class="editor-label">JavaScript</div>
      <textarea id="js" placeholder="// JS code ikkada raayi"></textarea>
    </div>
  </div>

  <div class="output-container">
    <iframe id="output"></iframe>
  </div>

  <script>
    function runCode() {
      const html = document.getElementById('html').value;
      const css = document.getElementById('css').value;
      const js = document.getElementById('js').value;
      const output = document.getElementById('output');
      output.srcdoc = `<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
    }

    function resetCode() {
      document.getElementById('html').value = '';
      document.getElementById('css').value = '';
      document.getElementById('js').value = '';
      document.getElementById('output').srcdoc = '';
    }

    // Page load ayinappudu khali ga start avvali
    window.onload = function() {
      resetCode();
    };
  </script>
</body>
</html>
