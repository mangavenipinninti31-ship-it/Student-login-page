<!DOCTYPE html>
<html>
<head>
  <title>Mangaveni 💚 | Web Playground</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: white; font-family: Arial; }
  .navbar {
      background: #2d2d2d;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #4a69bd;
    }
  .logo { font-weight: bold; color: #4a69bd; font-size: 18px; }
  .logout {
      background: #e55039;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
  .tabs {
      display: flex;
      background: #252525;
      border-bottom: 1px solid #444;
    }
  .tab {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
  .tab.active {
      border-bottom: 3px solid #4a69bd;
      color: #4a69bd;
    }
  .editor {
      display: none;
      width: 100%;
      height: 250px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      padding: 15px;
      font-family: monospace;
      font-size: 14px;
      resize: none;
      outline: none;
    }
  .editor.active { display: block; }
  .output-bar {
      background: #252525;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  .run-btn {
      background: #26de81;
      color: black;
      border: none;
      padding: 8px 20px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    #output {
      width: 100%;
      height: calc(100vh - 420px);
      background: white;
      border: none;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">Mangaveni 💚 | Web Playground</div>
    <button class="logout" onclick="location.href='index.html'">Logout</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="openTab('html')">HTML</div>
    <div class="tab" onclick="openTab('css')">CSS</div>
    <div class="tab" onclick="openTab('js')">JS</div>
  </div>

  <textarea id="html" class="editor active" placeholder="HTML code..."></textarea>
  <textarea id="css" class="editor" placeholder="CSS code..."></textarea>
  <textarea id="js" class="editor" placeholder="JS code..."></textarea>

  <div class="output-bar">
    <span>📺 Live Output - Auto Saved 💚</span>
    <button class="run-btn" onclick="runCode()">▶ Run</button>
  </div>

  <iframe id="output"></iframe>

  <script>
    // 1. Page load avagane localStorage nunchi code teesuko
    window.addEventListener('load', function() {
      document.getElementById('html').value = localStorage.getItem('mangaveni_html') || '<h1>Hi Mangaveni 💚</h1>\n<p>Nee code safe ga untundi!</p>';
      document.getElementById('css').value = localStorage.getItem('mangaveni_css') || 'body { background: #f0f0f0; }\nh1 { color: #4a69bd; text-align: center; }\np { text-align: center; }';
      document.getElementById('js').value = localStorage.getItem('mangaveni_js') || 'console.log("Welcome Mangaveni!");';
      runCode();
    });

    // 2. Tab switching
    function openTab(tabName) {
      document.querySelectorAll('.editor').forEach(ed => ed.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    // 3. Run + Save function
    function runCode() {
      let html = document.getElementById('html').value;
      let css = document.getElementById('css').value;
      let js = document.getElementById('js').value;

      // IMPORTANT: localStorage lo save chey
      localStorage.setItem('mangaveni_html', html);
      localStorage.setItem('mangaveni_css', css);
      localStorage.setItem('mangaveni_js', js);

      let output = document.getElementById('output');
      output.srcdoc = html + '<style>' + css + '</style><script>' + js + '<\/script>';
    }

    // 4. Auto-save on typing
    ['html', 'css', 'js'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        localStorage.setItem('mangaveni_' + id, document.getElementById(id).value);
      });
    });
  </script>
</body>
</html>
