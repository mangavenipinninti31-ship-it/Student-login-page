<!DOCTYPE html>
<html>
<head>
  <title>Mangaveni 💚 | Web Playground</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: white;
      font-family: Arial, sans-serif;
    }
  .navbar {
      background: #2d2d2d;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #4a69bd;
    }
  .logo {
      font-weight: bold;
      color: #4a69bd;
      font-size: 18px;
    }
  .logout {
      background: #e55039;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
  .tabs {
      display: flex;
      background: #252525;
      border-bottom: 1px solid #444;
    }
  .tab {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      user-select: none;
    }
  .tab.active {
      border-bottom: 3px solid #4a69bd;
      color: #4a69bd;
    }
  .editor {
      display: none;
      width: 100%;
      height: 250px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: none;
      outline: none;
    }
  .editor.active { display: block; }
  .output-bar {
      background: #252525;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #444;
    }
  .run-btn {
      background: #26de81;
      color: black;
      border: none;
      padding: 8px 20px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    #output {
      width: 100%;
      height: 300px;
      background: white;
      border: none;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">Mangaveni 💚 | Web Playground</div>
    <button class="logout" onclick="location.href='index.html'">Logout</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="openTab('html')">HTML</div>
    <div class="tab" onclick="openTab('css')">CSS</div>
    <div class="tab" onclick="openTab('js')">JS</div>
  </div>

  <textarea id="html" class="editor active" placeholder="HTML code..."></textarea>
  <textarea id="css" class="editor" placeholder="CSS code..."></textarea>
  <textarea id="js" class="editor" placeholder="JS code..."></textarea>

  <div class="output-bar">
    <span>📺 Live Output</span>
    <button class="run-btn" onclick="runCode()">▶ Run</button>
  </div>

  <iframe id="output"></iframe>

  <script>
    // Page load ayyagane save chesina code load chey
    window.onload = function() {
      document.getElementById('html').value = localStorage.getItem('mangaveni_html') || '<h1>Hi Mangaveni 💚</h1>\n<p>Code raasi Run kottu!</p>';
      document.getElementById('css').value = localStorage.getItem('mangaveni_css') || 'h1 { color: #4a69bd; text-align: center; }\np { text-align: center; color: #333; }';
      document.getElementById('js').value = localStorage.getItem('mangaveni_js') || 'console.log("Welcome Mangaveni!");';
      runCode(); // First load lo ne output chupinchu
    }

    // Tab switching
    function openTab(tabName) {
      let editors = document.getElementsByClassName('editor');
      for(let i = 0; i < editors.length; i++) {
        editors[i].classList.remove('active');
      }
      let tabs = document.getElementsByClassName('tab');
      for(let i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
      }
      document.getElementById(tabName).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    // Run + Auto Save
    function runCode() {
      let html = document.getElementById('html').value;
      let css = document.getElementById('css').value;
      let js = document.getElementById('js').value;

      // LocalStorage lo save - ippudu refresh chesina povadu
      localStorage.setItem('mangaveni_html', html);
      localStorage.setItem('mangaveni_css', css);
      localStorage.setItem('mangaveni_js', js);

      let output = document.getElementById('output');
      output.contentDocument.open();
      output.contentDocument.write(html + '<style>' + css + '</style><script>' + js + '<\/script>');
      output.contentDocument.close();
    }

    // Type chestunappude auto-save
    document.getElementById('html').addEventListener('input', () => {
      localStorage.setItem('mangaveni_html', document.getElementById('html').value);
    });
    document.getElementById('css').addEventListener('input', () => {
      localStorage.setItem('mangaveni_css', document.getElementById('css').value);
    });
    document.getElementById('js').addEventListener('input', () => {
      localStorage.setItem('mangaveni_js', document.getElementById('js').value);
    });
  </script>
</body>
</html>
