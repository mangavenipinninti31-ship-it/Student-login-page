<!DOCTYPE html>
<html>
<head>
  <title>Mangaveni 💚 | Web Playground</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: white; font-family: Arial; }
   .navbar {
      background: #2d2d2d;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #4a69bd;
    }
   .logo { font-weight: bold; color: #4a69bd; font-size: 18px; }
   .logout {
      background: #e55039;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
   .tabs {
      display: flex;
      background: #252525;
      border-bottom: 1px solid #444;
    }
   .tab {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
   .tab.active {
      border-bottom: 3px solid #4a69bd;
      color: #4a69bd;
    }
   .editor {
      display: none;
      width: 100%;
      height: 250px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      padding: 15px;
      font-family: monospace;
      font-size: 14px;
      resize: none;
    }
   .editor.active { display: block; }
   .output-bar {
      background: #252525;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
   .run-btn {
      background: #26de81;
      color: black;
      border: none;
      padding: 8px 20px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    #output {
      width: 100%;
      height: 300px;
      background: white;
      border: none;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">Mangaveni 💚 | Web Playground</div>
    <button class="logout" onclick="location.href='index.html'">Logout</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="openTab('html')">HTML</div>
    <div class="tab" onclick="openTab('css')">CSS</div>
    <div class="tab" onclick="openTab('js')">JS</div>
  </div>

  <textarea id="html" class="editor active" placeholder="HTML code..."></textarea>
  <textarea id="css" class="editor" placeholder="CSS code..."></textarea>
  <textarea id="js" class="editor" placeholder="JS code..."></textarea>

  <div class="output-bar">
    <span>📺 Live Output</span>
    <button class="run-btn" onclick="runCode()">▶ Run</button>
  </div>

  <iframe id="output"></iframe>

  <script>
    // Tab switching code
    function openTab(tabName) {
      // Hide all editors
      let editors = document.getElementsByClassName('editor');
      for(let i = 0; i < editors.length; i++) {
        editors[i].classList.remove('active');
      }
      // Remove active from all tabs
      let tabs = document.getElementsByClassName('tab');
      for(let i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
      }
      // Show selected editor + tab
      document.getElementById(tabName).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    // Run code function
    function runCode() {
      let html = document.getElementById('html').value;
      let css = document.getElementById('css').value;
      let js = document.getElementById('js').value;

      let output = document.getElementById('output');
      output.contentDocument.body.innerHTML = html + '<style>' + css + '</style>';
      output.contentWindow.eval(js);
    }
  </script>
</body>
</html>
