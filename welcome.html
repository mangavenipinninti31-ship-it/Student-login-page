<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - SDMSMK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
   .card {
      background: white; border-radius: 25px; padding: 50px 40px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.3); text-align: center; max-width: 500px; width: 100%;
    }
    #title { font-size: 2.8rem; color: #333; margin-bottom: 10px; }
   .name {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700;
    }
    #subtitle { color: #666; font-size: 1.2rem; margin: 20px 0 30px; }
    #rollNo {
      background: #f0f0f0; padding: 10px 20px; border-radius: 20px;
      display: inline-block; margin-bottom: 25px; color: #555; font-weight: 600;
    }
   .magic-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none;
      padding: 18px 40px; font-size: 1.3rem; border-radius: 50px; cursor: pointer; font-weight: 700;
      box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4); transition: all 0.3s;
    }
   .magic-btn:hover { transform: translateY(-3px) scale(1.05); }
   .magic-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #hearts { font-size: 2.5rem; margin-top: 25px; min-height: 50px; }
    #timer { color: #764ba2; font-weight: 600; margin-top: 15px; font-size: 1.1rem; }
    @media (min-width: 1024px) {
     .card { padding: 70px 60px; max-width: 700px; }
      #title { font-size: 3.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Hi <span class="name">Mangaveni</span> 💚</h1>
    <p id="rollNo">Roll No: 22A91A0505</p>
    <p id="subtitle">Nuvvu button nokkite magic jarugutundi</p>
    <button class="magic-btn" onclick="doMagic()" id="magicBtn">✨ Magic Button</button>
    <div id="hearts"></div>
    <p id="timer"></p>
  </div>
  <script>
    window.onload = () => {
      let studentName = localStorage.getItem('studentName') || 'Mangaveni';
      let roll = localStorage.getItem('studentRoll') || '22A91A0505';
      document.querySelector('.name').innerText = studentName.split(' ')[0];
      document.getElementById('rollNo').innerText = 'Roll No: ' + roll;
    }
    function doMagic() {
      let btn = document.getElementById('magicBtn');
      btn.disabled = true; btn.innerText = 'Loading... ⏳';
      let hearts = ['❤️', '💚', '💙', '💜', '💛'];
      let i = 0;
      let heartInterval = setInterval(() => {
        document.getElementById('hearts').innerHTML = hearts[i % 5].repeat(3); i++;
      }, 200);
      let count = 2;
      let timer = setInterval(() => {
        document.getElementById('timer').innerText = `Redirecting to Dashboard in ${count}s...`;
        count--;
        if(count < 0) {
          clearInterval(timer); clearInterval(heartInterval);
          window.location.href = 'dashboard.html';
        }
      }, 1000);
    }
  </script>
</body>
</html>
