<!DOCTYPE html>
<html>
<head>
  <title>Student Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-box">
    <h2>Student Login 🎓</h2>

  <script src="script.js"></script>
</body>
</html>
